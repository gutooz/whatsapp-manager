version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wmuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wmpassword}
      POSTGRES_DB: ${POSTGRES_DB:-whatsapp_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wmuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - wm_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wm_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wmuser}:${POSTGRES_PASSWORD:-wmpassword}@postgres:5432/${POSTGRES_DB:-whatsapp_manager}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wm_network
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wm_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXTAUTH_URL:-http://localhost}/api
      NEXT_PUBLIC_SOCKET_URL: ${NEXTAUTH_URL:-http://localhost}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - backend
    networks:
      - wm_network

  nginx:
    image: nginx:alpine
    container_name: wm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - wm_network

volumes:
  postgres_data:
  redis_data:
  uploads:
  certbot_www:
  certbot_conf:

networks:
  wm_network:
    driver: bridge
